<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISECO - Panel Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0f1a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding-bottom: 90px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(15, 23, 42, 0.9);
            position: sticky; top: 0; z-index: 500; border-bottom: 1px solid var(--glass);
        }

        .navbar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex; border-top: 1px solid var(--primary); z-index: 1000;
        }
        .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 0.75rem; color: #64748b; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        .card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px;
        }

        input, textarea, select, button {
            width: 100%; padding: 14px; margin: 8px 0;
            border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white;
            font-size: 1rem;
        }

        /* Estilo específico para que los puntos de la contraseña se vean bien */
        input[type="password"] {
            letter-spacing: 5px;
            text-align: center;
        }

        button { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #000; font-weight: bold; cursor: pointer; border: none; }

        .task-card {
            background: var(--glass); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; align-items: center; border-left: 4px solid var(--primary);
        }
        .task-card.done { opacity: 0.4; text-decoration: line-through; border-left-color: #00ff88; }

        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .photo-card { background: var(--glass); border-radius: 10px; overflow: hidden; border: 1px solid var(--primary); }
        .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .photo-card p { padding: 8px; margin: 0; font-size: 0.75rem; text-align: center; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <span id="userIndicator" style="color: var(--primary); font-size: 0.8rem;">Invitado</span>
        <div style="font-size: 1.5rem; cursor: pointer;" onclick="openSettings()">⋮</div>
    </div>

    <div id="upload" class="view active">
        <h2>📷 Nuevo Reporte</h2>
        <div class="card">
            <input type="file" id="fileInput" accept="image/*" capture="environment">
            <textarea id="photoDesc" placeholder="Descripción del reporte..." rows="2"></textarea>
            <button onclick="uploadImage()">REGISTRAR</button>
        </div>
    </div>

    <div id="gallery" class="view">
        <h2>🖼️ Galería</h2>
        <div class="gallery-grid" id="photoContainer"></div>
    </div>

    <div id="assign" class="view">
        <div id="assign-lock" class="card" style="text-align: center;">
            <h2>🛠️ Admin Panel</h2>
            <p style="font-size: 0.8rem; opacity: 0.6;">Ingrese código de acceso</p>
            <input type="password" id="accessKey" placeholder="••••" autocomplete="off">
            <button onclick="checkAssignKey()">ENTRAR</button>
        </div>
        <div id="assign-form" style="display: none;">
            <div class="card">
                <input type="text" id="taskName" placeholder="Descripción de la tarea...">
                <select id="userTask">
                    <option value="Carlos">Carlos</option>
                    <option value="Ammy">Ammy</option>
                    <option value="Usuario 3">Usuario 3</option>
                </select>
                <button onclick="createTask()">ASIGNAR</button>
                <button onclick="lockAssign()" style="background:none; color:gray; border:1px solid gray; margin-top:10px;">SALIR</button>
            </div>
        </div>
    </div>

    <div id="tasks" class="view">
        <div id="user-selection-zone">
            <div class="card" style="text-align:center;">
                <h2>📋 Mis Tareas</h2>
                <button onclick="accessTasks('Carlos')">SOY CARLOS</button>
                <button onclick="accessTasks('Ammy')" style="margin-top:10px;">SOY AMMY</button>
            </div>
        </div>
        <div id="private-task-zone" style="display: none;">
            <h2 id="taskOwnerTitle">Tareas</h2>
            <div id="taskList"></div>
            <button onclick="exitTasks()" style="background:none; border:1px solid var(--primary); color:var(--primary); margin-top:20px;">CAMBIAR PERFIL</button>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-item active" onclick="showView('upload', this)">SUBIR</div>
        <div class="nav-item" onclick="showView('gallery', this)">FOTOS</div>
        <div class="nav-item" onclick="showView('assign', this)">ASIGNAR</div>
        <div class="nav-item" onclick="showView('tasks', this)">TAREAS</div>
    </nav>

<script>
    // CARGAR DATOS DE LOCAL STORAGE
    let allTasks = JSON.parse(localStorage.getItem('diseco_tasks')) || [];
    let allPhotos = JSON.parse(localStorage.getItem('diseco_photos')) || [];
    let loggedUser = localStorage.getItem('diseco_user') || null;

    function initApp() {
        renderGallery();
        if(loggedUser) accessTasks(loggedUser);
    }

    function saveData() {
        localStorage.setItem('diseco_tasks', JSON.stringify(allTasks));
        localStorage.setItem('diseco_photos', JSON.stringify(allPhotos));
        localStorage.setItem('diseco_user', loggedUser || "");
    }

    function showView(viewId, element) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        element.classList.add('active');
        if(viewId === 'tasks' && loggedUser) renderTasks();
    }

    // --- ACCESO Y TAREAS ---
    function accessTasks(user) {
        loggedUser = user;
        document.getElementById('user-selection-zone').style.display = 'none';
        document.getElementById('private-task-zone').style.display = 'block';
        document.getElementById('taskOwnerTitle').innerText = `Tareas de ${user}`;
        document.getElementById('userIndicator').innerText = user;
        saveData();
        renderTasks();
    }

    function exitTasks() {
        loggedUser = null;
        document.getElementById('user-selection-zone').style.display = 'block';
        document.getElementById('private-task-zone').style.display = 'none';
        document.getElementById('userIndicator').innerText = "Invitado";
        saveData();
    }

    function createTask() {
        const name = document.getElementById('taskName').value;
        const user = document.getElementById('userTask').value;
        if (!name) return;
        allTasks.push({ id: Date.now(), user, name, done: false });
        document.getElementById('taskName').value = "";
        saveData();
        Swal.fire({ icon: 'success', title: 'Tarea Asignada', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
    }

    function renderTasks() {
        const container = document.getElementById('taskList');
        container.innerHTML = "";
        const filtered = allTasks.filter(t => t.user === loggedUser);
        filtered.forEach(t => {
            container.innerHTML += `
                <div class="task-card ${t.done ? 'done' : ''}">
                    <div style="flex:1"><b>${t.name}</b></div>
                    <input type="radio" ${t.done ? 'checked disabled' : ''} onclick="markDone(${t.id})">
                </div>`;
        });
    }

    function markDone(id) {
        allTasks.find(t => t.id === id).done = true;
        saveData();
        renderTasks();
    }

    // --- FOTOS ---
    function uploadImage() {
        const input = document.getElementById('fileInput');
        const desc = document.getElementById('photoDesc').value;
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                allPhotos.push({ src: e.target.result, text: desc || "Sin descripción" });
                saveData();
                renderGallery();
                input.value = ""; document.getElementById('photoDesc').value = "";
                Swal.fire({ icon: 'success', title: 'Reporte Guardado', background: '#1e293b', color: '#fff' });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function renderGallery() {
        const container = document.getElementById('photoContainer');
        container.innerHTML = "";
        allPhotos.forEach(p => {
            container.innerHTML += `<div class="photo-card"><img src="${p.src}" onclick="viewFull('${p.src}')"><p>${p.text}</p></div>`;
        });
    }

    function viewFull(src) {
        Swal.fire({ imageUrl: src, background: 'rgba(0,0,0,0.9)', showConfirmButton: false });
    }

    // --- SEGURIDAD ---
    function checkAssignKey() {
        const keyVal = document.getElementById('accessKey').value;
        if (keyVal === "AbCd") {
            document.getElementById('assign-lock').style.display = 'none';
            document.getElementById('assign-form').style.display = 'block';
            document.getElementById('accessKey').value = "";
        } else {
            Swal.fire({ icon: 'error', title: 'Key Incorrecta', text: 'Acceso denegado' });
            document.getElementById('accessKey').value = "";
        }
    }

    function lockAssign() {
        document.getElementById('assign-lock').style.display = 'block';
        document.getElementById('assign-form').style.display = 'none';
    }

    function openSettings() {
        Swal.fire({
            title: 'Configuración', background: '#1e293b', color: '#fff', showConfirmButton: false,
            html: `
                <button onclick="clearAll()" style="background:#ff4b2b; color:white; padding:15px; width:100%; border-radius:10px; border:none; cursor:pointer;">🔄 Borrar Todo (Reset)</button>
                <button onclick="shutdownServer()" style="background:#444; color:white; padding:15px; width:100%; border-radius:10px; border:none; margin-top:10px; cursor:pointer;">⚠️ Apagar Servidor</button>`
        });
    }

    function clearAll() {
        Swal.fire({ title: '¿Borrar datos?', text: "Se eliminarán fotos y tareas permanentemente.", icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) { localStorage.clear(); location.reload(); }
        });
    }

    function shutdownServer() {
        Swal.fire({ title: 'Cerrando sistema...', timer: 1500, showConfirmButton: false }).then(() => {
            document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>SISTEMA FUERA DE LÍNEA</h1>";
        });
    }
</script>
</body>
</html>
