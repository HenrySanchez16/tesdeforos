<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Reportes y Tareas</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 600px; margin: auto; }

        /* Estilo Glassmorphism */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .gallery img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📷 Reporte Fotográfico</h2>
        <input type="file" id="photoInput" accept="image/*" capture="environment">
        <button onclick="savePhoto()">Subir / Tomar Foto</button>
    </div>

    <div class="card">
        <h2>🖼️ Galería de Reportes</h2>
        <div id="gallery" class="gallery"></div>
    </div>

    <div class="card">
        <h2>📝 Asignar Tarea</h2>
        <input type="text" id="taskText" placeholder="Descripción de la tarea...">
        <select id="userSelect">
            <option value="Usuario 1">Usuario 1</option>
            <option value="Usuario 2">Usuario 2</option>
            <option value="Usuario 3">Usuario 3</option>
        </select>
        <button onclick="addTask()">Asignar a Usuario</button>
    </div>

    <div class="card">
        <h2>✅ Estado de Tareas</h2>
        <div id="taskList"></div>
    </div>
</div>

<script>
    // --- LÓGICA DE FOTOS ---
    function savePhoto() {
        const input = document.getElementById('photoInput');
        const gallery = document.getElementById('gallery');

        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                gallery.appendChild(img);
                
                // Limpiar input
                input.value = "";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- LÓGICA DE TAREAS ---
    function addTask() {
        const text = document.getElementById('taskText').value;
        const user = document.getElementById('userSelect').value;
        const list = document.getElementById('taskList');

        if (text === "") return;

        const div = document.createElement('div');
        div.className = 'task-item';
        div.innerHTML = `
            <span><strong>${user}:</strong> ${text}</span>
            <input type="radio" onclick="completeTask(this)">
        `;
        
        list.appendChild(div);
        document.getElementById('taskText').value = "";
    }

    function completeTask(radio) {
        if(radio.checked) {
            const span = radio.parentElement.querySelector('span');
            span.style.textDecoration = "line-through";
            span.style.opacity = "0.5";
            radio.disabled = true;
        }
    }
</script>

</body>
</html>
